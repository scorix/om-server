syntax = "proto3";

package om.v1;

service OmSpatialService {
  rpc ListSources(ListSourcesRequest) returns (ListSourcesResponse);
  rpc GetSpatialMeta(GetSpatialMetaRequest) returns (GetSpatialMetaResponse);
  rpc GetSpatialPointSeries(GetSpatialPointSeriesRequest)
      returns (GetSpatialPointSeriesResponse);
}

message ListSourcesRequest {}

message ListSourcesResponse {
  repeated Source sources = 1;
}

message Source {
  string model = 1;
  repeated string layouts = 2;
}

message GetSpatialMetaRequest {
  string model = 1;
  string run_ref = 2;
  string timestamp = 3;
}

message GetSpatialMetaResponse {
  string model = 1;
  string object_key = 2;
  string local_path = 3;
  repeated VariableMeta variables = 4;
}

message VariableMeta {
  string name = 1;
  string data_type = 2;
  repeated uint64 dimensions = 3;
  repeated uint64 chunks = 4;
}

message GetSpatialPointSeriesRequest {
  string model = 1;
  double latitude = 2;
  double longitude = 3;
  uint32 days = 4;
}

message GetSpatialPointSeriesResponse {
  string model = 1;
  string run_ref = 2;
  repeated string elements = 3;
  repeated SpatialPointSample samples = 4;
}

message SpatialPointSample {
  string timestamp = 1;
  string valid_date = 2;
  repeated SpatialElementValue values = 3;
}

message SpatialElementValue {
  string element = 1;
  double value = 2;
}
